spring.application.name=bizcore

# =============================================
# DATABASE
# =============================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bizcore}
spring.datasource.username=${DB_USERNAME:bizcore}
spring.datasource.password=${DB_PASSWORD:bizcore}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =============================================
# FLYWAY
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# =============================================
# REDIS
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# =============================================
# RABBITMQ
# =============================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/

# =============================================
# JWT
# =============================================
# Mínimo 32 caracteres. Cambiar en producción.
bizcore.jwt.secret=${JWT_SECRET:bizcore-super-secret-key-change-in-prod-!!}
bizcore.jwt.access-token-expiration=900
bizcore.jwt.refresh-token-expiration-days=30

# =============================================
# STRIPE
# =============================================
bizcore.stripe.secret-key=${STRIPE_SECRET_KEY:}
bizcore.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
bizcore.stripe.price-id.basic=${STRIPE_PRICE_BASIC:}
bizcore.stripe.price-id.standard=${STRIPE_PRICE_STANDARD:}
bizcore.stripe.price-id.premium=${STRIPE_PRICE_PREMIUM:}

# =============================================
# CLOUDFLARE R2
# =============================================
bizcore.r2.endpoint=${R2_ENDPOINT:}
bizcore.r2.access-key=${R2_ACCESS_KEY:}
bizcore.r2.secret-key=${R2_SECRET_KEY:}
bizcore.r2.bucket=${R2_BUCKET:bizcore-uploads}
bizcore.r2.public-url=${R2_PUBLIC_URL:}

# =============================================
# RESEND (Email)
# =============================================
bizcore.resend.api-key=${RESEND_API_KEY:}
bizcore.resend.from-email=${RESEND_FROM_EMAIL:noreply@bizcore.app}

# =============================================
# TWILIO (WhatsApp / SMS - solo plan Premium)
# =============================================
bizcore.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
bizcore.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
bizcore.twilio.from-number=${TWILIO_FROM_NUMBER:}

# =============================================
# SPRINGDOC / SWAGGER
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# =============================================
# LOGGING
# =============================================
logging.level.com.bizcore=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.flywaydb=INFO
